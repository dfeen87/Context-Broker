name: Context Broker Validation

on:
  pull_request:
  push:
    paths:
      - "examples/**"
      - "schemas/**"
      - "src/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install jsonschema

      - name: Validate example packets
        run: |
          python - <<'PY'
          import json, tempfile
          from datetime import datetime, timedelta, timezone
          from pathlib import Path
          now = datetime.now(timezone.utc)
          packet = {
              "schema_version": "1.0.0",
              "context_id": "ctx_ci_validate",
              "intent": "ci_validation",
              "scope": "ci",
              "source": "github-actions",
              "actor": "ci",
              "payload": {"message": "validation test"},
              "created_at": now.isoformat().replace("+00:00", "Z"),
              "ttl": "1h",
              "expires_at": (now + timedelta(hours=1)).isoformat().replace("+00:00", "Z"),
              "permissions": ["read"],
          }
          tmp = Path(tempfile.gettempdir()) / "valid_packet.json"
          tmp.write_text(json.dumps(packet), encoding="utf-8")
          print(tmp)
          PY
          python src/validate_packet.py /tmp/valid_packet.json --output text
          ! python src/validate_packet.py examples/packet.expired.json || true
